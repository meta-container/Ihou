<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture Gallery Pro (Handtrack.js)</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050505;
            --glass-bg: rgba(20, 20, 20, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-color: #00d4ff;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-dark); overflow: hidden;
            font-family: 'Montserrat', sans-serif; color: var(--text-main);
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000000 100%);
        }

        #viewer-container {
            position: relative; width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        #active-image {
            max-width: 90%; max-height: 85%; object-fit: contain; 
            opacity: 0; transform: scale(0.95);
            transition: opacity 0.5s ease, transform 0.5s ease;
            border-radius: 4px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); z-index: 1;
        }
        #active-image.loaded { opacity: 1; transform: scale(1); }

        .glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); z-index: 10;
        }

        #info-overlay {
            position: absolute; top: 30px; left: 30px; padding: 15px 25px;
            display: flex; flex-direction: column; gap: 5px;
            border-left: 3px solid var(--accent-color);
        }
        #info-overlay h2 { margin: 0; font-weight: 600; font-size: 1.1rem; text-transform: uppercase; }
        #info-overlay .meta { font-size: 0.85rem; color: var(--text-muted); font-weight: 300; }
        #info-overlay .meta span { color: var(--accent-color); font-weight: 600; }

        #webcam-wrapper {
            position: absolute; bottom: 30px; right: 30px;
            width: 240px; height: 180px; border-radius: 12px;
            overflow: hidden; border: 1px solid var(--glass-border); z-index: 20;
        }

        #webcam-preview, #hand-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }
        
        #gesture-indicator {
            position: absolute; bottom: 220px; right: 30px; padding: 8px 16px;
            font-size: 0.8rem; border-radius: 20px; background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--accent-color); color: var(--accent-color);
            opacity: 0; transition: opacity 0.3s; text-transform: uppercase; font-weight: 600;
        }
        #gesture-indicator.active { opacity: 1; }

        #toast {
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: #ff4757; color: white; padding: 12px 30px; border-radius: 30px;
            font-weight: 600; box-shadow: 0 10px 20px rgba(255, 71, 87, 0.3);
            transition: transform 0.4s ease; z-index: 100;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/handtrackjs/dist/handtrack.min.js"></script>
</head>
<body>

    <div id="viewer-container">
        <img id="active-image" alt="Gallery Image" />
        
        <div id="info-overlay" class="glass-panel">
            <h2>Gesture Gallery</h2>
            <div class="meta">File: <span id="ui-filename">Loading...</span></div>
        </div>

        <div id="gesture-indicator">Hand Detected</div>

        <div id="webcam-wrapper" class="glass-panel">
            <video id="webcam-preview" autoplay playsinline muted></video>
            <canvas id="hand-canvas"></canvas>
        </div>

        <div id="toast">Loading AI Model...</div>
    </div>

    <script>
        const ASSETS_FOLDER = 'assets/';
        const LOCAL_IMAGES = Array.from({length: 15}, (_, i) => `${i + 1}.jpg`);
        let currentIndex = 0;

        const imgElement = document.getElementById('active-image');
        const video = document.getElementById('webcam-preview');
        const canvas = document.getElementById('hand-canvas');
        const context = canvas.getContext('2d');
        const indicator = document.getElementById('gesture-indicator');

        // --- UI Logic ---
        function showToast(msg, color = '#00d4ff') {
            const toast = document.getElementById('toast');
            toast.innerText = msg; toast.style.background = color;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function showImage(index) {
            if (index < 0) currentIndex = LOCAL_IMAGES.length - 1;
            else if (index >= LOCAL_IMAGES.length) currentIndex = 0;
            else currentIndex = index;

            const filename = LOCAL_IMAGES[currentIndex];
            imgElement.classList.remove('loaded');
            
            const tempImg = new Image();
            tempImg.onload = () => {
                imgElement.src = tempImg.src;
                setTimeout(() => imgElement.classList.add('loaded'), 50);
                document.getElementById('ui-filename').innerText = filename;
            };
            tempImg.onerror = () => showToast(`Missing: ${filename}`, '#ff4757');
            tempImg.src = `${ASSETS_FOLDER}${filename}`;
        }

        function flash(text) {
            indicator.innerText = text; indicator.classList.add('active');
            setTimeout(() => indicator.classList.remove('active'), 800);
        }

        // --- Handtrack.js Logic ---
        let model = null;
        let lastX = null;
        let isSwiping = false;

        const modelParams = {
            flipHorizontal: true,   // Mirrors the camera automatically!
            maxNumBoxes: 1,         // Only track one hand
            iouThreshold: 0.5,
            scoreThreshold: 0.70    // Needs 70% confidence it's a hand
        };

        handTrack.load(modelParams).then(lmodel => {
            model = lmodel;
            showToast("AI Ready! Starting Camera...");
            
            handTrack.startVideo(video).then(status => {
                if (status) {
                    showToast("Camera Active: Swipe Left/Right", '#2ed573');
                    runDetection();
                } else {
                    showToast("Please enable camera permissions.", '#ff4757');
                }
            });
        });

        function runDetection() {
            model.detect(video).then(predictions => {
                // Draw the tracking box so you can see what it's doing
                model.renderPredictions(predictions, canvas, context, video);

                if (predictions.length > 0) {
                    indicator.innerText = "Tracking";
                    indicator.classList.add('active');

                    // Get the X coordinate of the center of the hand
                    const handBox = predictions[0].bbox; 
                    const currentX = handBox[0] + (handBox[2] / 2); 

                    if (lastX !== null && !isSwiping) {
                        const deltaX = currentX - lastX;

                        // If moved more than 40 pixels
                        if (deltaX > 40) {
                            showImage(currentIndex - 1);
                            flash("Swiped Left");
                            triggerCooldown();
                        } else if (deltaX < -40) {
                            showImage(currentIndex + 1);
                            flash("Swiped Right");
                            triggerCooldown();
                        }
                    }
                    lastX = currentX;
                } else {
                    indicator.classList.remove('active');
                    lastX = null; // Reset when hand leaves screen
                }
                
                requestAnimationFrame(runDetection);
            });
        }

        function triggerCooldown() {
            isSwiping = true;
            lastX = null;
            setTimeout(() => { isSwiping = false; }, 1000); // 1 second cooldown
        }

        // --- Init ---
        showImage(0);
        
        // Keyboard fallback
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') showImage(currentIndex + 1);
            if (e.key === 'ArrowLeft') showImage(currentIndex - 1);
        });
    </script>
</body>
</html>
